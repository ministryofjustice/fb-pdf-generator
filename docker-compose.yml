networks:
  app-net:
    name: fb-app-bridge-network

services:
  api:
    container_name: pdf-generator-api
    # platform: linux/x86_64
    platform: linux/amd64
    build:
      context: .
      args:
        UID: "${UID}"
        BUNDLE_ARGS: ''
        BUNDLE_WITHOUT: 'development'
    user: "${UID}:${UID}"
    command: bundle exec rails s -p 3000 -b '0.0.0.0'
    environment:
      SENTRY_DSN: ''
      RAILS_ENV: development
    ports:
      - "3000:3000"
    networks:
      - app-net
