version: 2.1
orbs:
  slack: circleci/slack@3.4.2
  ruby: circleci/ruby@1.4.0
  aws-cli: circleci/aws-cli@4.0.0
  browser-tools: circleci/browser-tools@1.4.7

jobs:
  login-to-aws:
    docker: &docker_image
      - image: "cimg/ruby:3.3-node"
    steps:
      - checkout
      - aws-cli/setup:
          role_arn: $ECR_ROLE_TO_ASSUME # this will use the env var
          region: $ECR_REGION # this will use the env var
      - run: &ecr_login
          name: Login to ecr
          command: |
            aws ecr get-login-password --region $ECR_REGION | docker login --username AWS --password-stdin ${AWS_ECR_REGISTRY_ID}.dkr.ecr.${ECR_REGION}.amazonaws.com
            aws configure export-credentials --format env
      - run: |
          cp $BASH_ENV bash.env
      - persist_to_workspace:
          root: .
          paths:
            - bash.env
  build:
    docker: &ruby_image
      - image: "cimg/ruby:3.3"
    steps:
      - checkout
      - ruby/install-deps
      - slack/status: &slack_status
          fail_only: true
          only_for_branches: main
          failure_message: ":facepalm:  Failed job $CIRCLE_JOB  :homer-disappear:"
          include_job_number_field: false
  test:
    docker: *ruby_image
    steps:
      - checkout
      - ruby/install-deps
      - run:
          name: test
          command: |
            mkdir -p ~/test-results/rspec
            bundle exec rspec --format progress --format RspecJunitFormatter --out ~/test-results/rspec/results.xml
      - store_test_results:
          path: ~/test-results
      - slack/status: *slack_status
  lint:
    docker: *ruby_image
    steps:
      - checkout
      - ruby/install-deps
      - run:
          name: lint
          command: bundle exec rubocop --cache false
      - slack/status: *slack_status
  build_and_push_image:
    working_directory: ~/circle/git/fb-pdf-generator
    docker: &ecr_base_image
      - image: docker.io/ministryofjustice/fb-builder:latest
        auth:
          username: $DOCKER_LOGIN
          password: $DOCKER_PASSWORD
    steps:
      - checkout
      - setup_remote_docker: &remote_docker
          docker_layer_caching: true
      - attach_workspace:
          at: .
      - run: &workspace_envs
          command: |
            cat bash.env >> $BASH_ENV
      - run: &base_environment_variables
          name: Setup base environment variable
          command: |
            echo "export BUILD_SHA=$CIRCLE_SHA1" >> $BASH_ENV
            echo "export SSH_FILE_FOR_SECRETS=~/.ssh/id_rsa_2f3b4f74743d1cb78ab5447542351831" >> $BASH_ENV
      - run: &deploy_scripts
          name: cloning deploy scripts
          command: "git clone git@github.com:ministryofjustice/fb-deploy.git deploy-scripts"
      - run:
          name: build and push docker images
          environment:
            ENVIRONMENT_NAME: test
          command: "./deploy-scripts/bin/build"
      - slack/status: *slack_status
  deploy_to_test_dev:
    working_directory: ~/circle/git/fb-pdf-generator
    docker: *ecr_base_image
    steps:
      - checkout
      - setup_remote_docker: *remote_docker
      - add_ssh_keys: &ssh_keys
          fingerprints:
            - "2f:3b:4f:74:74:3d:1c:b7:8a:b5:44:75:42:35:18:31"
      - run: *base_environment_variables
      - run: *deploy_scripts
      - run:
          name: deploy to test dev (EKS cluster)
          environment:
            APPLICATION_NAME: fb-pdf-generator
            PLATFORM_ENV: test
            DEPLOYMENT_ENV: dev
            K8S_NAMESPACE: formbuilder-platform-test-dev
          command: "./deploy-scripts/bin/deploy-eks"
      - slack/status: *slack_status
  deploy_to_test_production:
    working_directory: ~/circle/git/fb-pdf-generator
    docker: *ecr_base_image
    steps:
      - checkout
      - setup_remote_docker: *remote_docker
      - add_ssh_keys: *ssh_keys
      - run: *base_environment_variables
      - run: *deploy_scripts
      - run:
          name: deploy to test production (EKS cluster)
          environment:
            APPLICATION_NAME: fb-pdf-generator
            PLATFORM_ENV: test
            DEPLOYMENT_ENV: production
            K8S_NAMESPACE: formbuilder-platform-test-production
          command: "./deploy-scripts/bin/deploy-eks"
      - slack/status: *slack_status
  deploy_to_live_dev:
    working_directory: ~/circle/git/fb-pdf-generator
    docker: *ecr_base_image
    steps:
      - checkout
      - setup_remote_docker: *remote_docker
      - add_ssh_keys: *ssh_keys
      - run: *base_environment_variables
      - run: *deploy_scripts
      - run:
          name: deploy to live dev (EKS)
          environment:
            APPLICATION_NAME: fb-pdf-generator
            PLATFORM_ENV: live
            DEPLOYMENT_ENV: dev
            K8S_NAMESPACE: formbuilder-platform-live-dev
          command: "./deploy-scripts/bin/deploy-eks"
      - slack/status:
          only_for_branches: main
          success_message: ":rocket:  Successfully deployed to Live Dev  :guitar:"
          failure_message: ":alert:  Failed to deploy to Live Dev  :try_not_to_cry:"
          include_job_number_field: false
  deploy_to_live_production:
    working_directory: ~/circle/git/fb-pdf-generator
    docker: *ecr_base_image
    steps:
      - checkout
      - setup_remote_docker: *remote_docker
      - add_ssh_keys: *ssh_keys
      - run: *base_environment_variables
      - run: *deploy_scripts
      - run:
          name: deploy to live production (EKS)
          environment:
            APPLICATION_NAME: fb-pdf-generator
            PLATFORM_ENV: live
            DEPLOYMENT_ENV: production
            K8S_NAMESPACE: formbuilder-platform-live-production
          command: "./deploy-scripts/bin/deploy-eks"
      - slack/status:
          only_for_branches: main
          success_message: ":rocket:  Successfully deployed to Live Production  :guitar:"
          failure_message: ":alert:  Failed to deploy to Live Production  :try_not_to_cry:"
          include_job_number_field: false
  acceptance_tests:
    docker: *ruby_image
    steps:
      - checkout
      - run: sudo apt-get update
      - browser-tools/install-chrome:
          chrome-version: 138.0.7204.183
      - browser-tools/install-chromedriver
      - run:
          name: Check browser tools install
          command: |
            google-chrome --version
            chromedriver --version
      - run: mkdir ~/rspec
      - run:
          name: Run acceptance tests
          environment:
            CI_MODE: 'true'
          command: |
            git clone https://github.com/ministryofjustice/fb-acceptance-tests

            cd fb-acceptance-tests/integration
            cp tests.env.ci tests.env

            echo "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}" >> tests.env
            echo "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}" >> tests.env
            echo "GOOGLE_REFRESH_TOKEN='${GOOGLE_REFRESH_TOKEN}'" >> tests.env

            echo "NEW_RUNNER_ACCEPTANCE_TEST_USER=${NEW_RUNNER_ACCEPTANCE_TEST_USER}" >> tests.env
            echo "NEW_RUNNER_ACCEPTANCE_TEST_PASSWORD=${NEW_RUNNER_ACCEPTANCE_TEST_PASSWORD}" >> tests.env

            echo "MS_LIST_ID=${MS_LIST_ID}" >> tests.env
            echo "MS_SITE_ID=${MS_SITE_ID}" >> tests.env
            echo "MS_OAUTH_URL=${MS_OAUTH_URL}" >> tests.env
            echo "MS_ADMIN_APP_SECRET=${MS_ADMIN_APP_SECRET}" >> tests.env
            echo "MS_ADMIN_APP_ID=${MS_ADMIN_APP_ID}" >> tests.env

            echo "SMOKE_TEST_USER=${SMOKE_TEST_USER}" >> tests.env
            echo "SMOKE_TEST_PASSWORD=${SMOKE_TEST_PASSWORD}" >> tests.env

            bundle install

            circleci tests glob "spec/features/v2/**/*_spec.rb" | circleci tests run --command="xargs bundle exec rspec --format progress --format RspecJunitFormatter -o ~/rspec/rspec.xml" --verbose --split-by=timings
      - store_test_results:
          path: ~/rspec
      - slack/status: *slack_status

#  acceptance_tests:
#    docker: *ecr_base_image
#    resource_class: large
#    steps:
#      - checkout
#      - setup_remote_docker: *remote_docker
#      - run: *deploy_scripts
#      - run:
#          name: Run acceptance tests
#          command: |
#            mkdir -p ~/test-results/acceptance
#            circleci tests glob "spec/**/*_spec.rb" | circleci tests run --command="xargs ./deploy-scripts/bin/acceptance_tests --format progress --format RspecJunitFormatter --out ~/test-results/acceptance/results.xml" --verbose
#      - store_test_results:
#          path: ~/test-results
#      - slack/status: *slack_status
  smoke_tests:
    docker: *ecr_base_image
    steps:
      - checkout
      - setup_remote_docker: *remote_docker
      - run: *deploy_scripts
      - run:
          name: Run smoke tests
          command: "./deploy-scripts/bin/smoke_tests"
      - slack/status: *slack_status

workflows:
  version: 2
  test_and_deploy:
    jobs:
      - login-to-aws:
          context: &moj-forms-context
            - moj-forms
            - moj-forms-platform-apps
      - build:
          requires:
            - login-to-aws
      - test:
          requires:
            - build
      - lint:
          requires:
            - build
      - build_and_push_image:
          context: *moj-forms-context
          requires:
            - test
            - lint
          filters:
            branches:
              only:
                - CDPTKAN-1038-rerun-failed-tests
      - deploy_to_test_dev:
          context: *moj-forms-context
          requires:
            - build_and_push_image
#      - deploy_to_test_production:
#          context: *moj-forms-context
#          requires:
#            - build_and_push_image
      - acceptance_tests:
          context: *moj-forms-context
          requires:
            - deploy_to_test_dev
#            - deploy_to_test_production
      - smoke_tests:
          context: *moj-forms-context
          requires:
            - acceptance_tests
